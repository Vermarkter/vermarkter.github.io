<style>
*{box-sizing:border-box;margin:0;padding:0}
.w{padding:.5rem 0;font-family:var(--font-sans)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 11px}
.sl{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.sv{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.tb{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.tb input,.tb select{font-size:12px;padding:5px 9px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.tb input{flex:1;min-width:130px}
.cb{font-size:12px;padding:5px 12px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.cb:hover{background:var(--color-background-secondary)}
.sh{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;padding:8px 0 4px;border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:5px}
.cs{display:flex;flex-direction:column;gap:5px;margin-bottom:7px}
.c{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:9px 12px}
.c:hover{border-color:var(--color-border-secondary)}
.ct{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.cn{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;line-height:1.3}
.br{background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:11px;padding:2px 6px;border-radius:999px;flex-shrink:0}
.db{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:1px 3px;flex-shrink:0}
.db:hover{color:var(--color-text-primary)}
.cm{font-size:11px;color:var(--color-text-secondary);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ca{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mb{display:inline-flex;padding:4px 9px;font-size:11px;border-radius:var(--border-radius-md);text-decoration:none;background:#EEEDFE;color:#3C3489;border:.5px solid #AFA9EC}
.mb:hover{background:#CECBF6}
.wb{display:inline-flex;padding:4px 9px;font-size:11px;font-weight:500;border-radius:var(--border-radius-md);text-decoration:none;background:#E1F5EE;color:#085041;border:.5px solid #5DCAA5}
.wb:hover{background:#9FE1CB}
.ss{font-size:11px;padding:3px 6px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;margin-left:auto}
.pi{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.pi input{font-size:11px;padding:3px 7px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);flex:1;min-width:100px}
.si{font-size:11px;padding:3px 7px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.si:hover{background:var(--color-background-secondary)}
.ac{background:var(--color-background-secondary);border:.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:10px 12px;margin-top:8px}
.ag{display:grid;grid-template-columns:2fr 1fr 1fr;gap:7px;margin-bottom:7px}
.ag input,.ag select{font-size:12px;padding:5px 7px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.ar2{display:flex;gap:7px}
.ar2 input{flex:1;font-size:12px;padding:5px 7px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.ab{font-size:12px;padding:5px 13px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap}
.em{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
@media(prefers-color-scheme:dark){
.wb{background:#085041;color:#9FE1CB;border-color:#0F6E56}.wb:hover{background:#0F6E56}
.mb{background:#3C3489;color:#CECBF6;border-color:#534AB7}.mb:hover{background:#534AB7}
}

const data=R.map(r=>({city:r[0],name:r[1],addr:r[2],phone:r[3],rating:r[4],pid:r[5],site:'',status:'Не сконтактовано',date:'16.03.2026'}));

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const fc=document.getElementById('fc').value;
  const fs=document.getElementById('fs').value;
  const f=data.filter(r=>
    (!q||(r.name+r.city+r.addr+r.phone+r.site).toLowerCase().includes(q))&&
    (!fc||r.city===fc)&&(!fs||r.status===fs)
  );
  document.getElementById('sa').textContent=data.length;
  document.getElementById('sw').textContent=data.filter(r=>r.status==='Написав').length;
  document.getElementById('st').textContent=data.filter(r=>r.status==='Думає').length;
  document.getElementById('sb').textContent=data.filter(r=>r.status==='Купив').length;
  const cities=[...new Set(f.map(r=>r.city))];
  const root=document.getElementById('root');
  if(!f.length){root.innerHTML='<div class="em">Нічого не знайдено</div>';return;}
  root.innerHTML=cities.map(city=>{
    const rows=f.filter(r=>r.city===city);
    return `<div class="sh">${city} — ${rows.length}</div><div class="cs">${rows.map(r=>{
      const i=data.indexOf(r);
      const link=wl(r.phone,r.name);
      const mlink=ml(r.pid,r.name,r.addr);
      const mobile=r.phone&&r.phone!=='—'&&isMobile(r.phone);
      return `<div class="c" style="${mobile?'border-color:rgba(37,211,102,0.4);background:rgba(37,211,102,0.04)':''}">
        <div class="ct">
          <div class="cn">${r.name}${mobile?' 📱':''}</div>
          <span class="br">★ ${r.rating}</span>
          <button class="db" onclick="toggleEdit(${i})">${r._edit?'✓':'✎'}</button>
          <button class="db" onclick="del(${i})">✕</button>
        </div>
        ${r._edit?`<div class="pi">
          <input value="${r.phone}" onchange="upd(${i},'phone',this.value)" placeholder="Телефон">
          <input value="${r.site}" onchange="upd(${i},'site',this.value)" placeholder="Сайт">
          <button class="si" onclick="toggleEdit(${i})">✓ Зберегти</button>
        </div>`:`<div class="cm">${r.addr}${r.phone!=='—'?' · '+r.phone:''}${r.site?' · '+r.site:''}</div>`}
        <div class="ca">
          <a class="mb" href="${mlink}" target="_blank">Maps</a>
          ${link
            ?`<a class="wb" href="${link}" target="_blank" style="background:#25D366;color:#fff;border-color:#25D366;font-weight:700">✅ WhatsApp</a>`
            :(r.phone&&r.phone!=='\u2014'?`<span class="wb" style="opacity:0.3;cursor:not-allowed;filter:grayscale(100%)" title="Стаціонарний — WhatsApp малоймовірний">📞 Стаціонарний</span>`:'')
          }
          <select class="ss" onchange="chS(${i},this.value)">
            ${['Не сконтактовано','Написав','Думає','Купив'].map(s=>`<option${s===r.status?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>`;
    }).join('')}</div>`;
  }).join('');
}

function toggleEdit(i){data[i]._edit=!data[i]._edit;render();}
function upd(i,k,v){data[i][k]=v;}
function chS(i,v){data[i].status=v;render();}
function del(i){data.splice(i,1);render();}
function addRow(){
  const n=document.getElementById('an').value.trim();
  if(!n)return;
  data.unshift({name:n,city:document.getElementById('acf').value,addr:document.getElementById('aad').value||'',phone:document.getElementById('aph').value||'—',site:document.getElementById('awe').value||'',rating:document.getElementById('arat').value||'—',pid:document.getElementById('apid').value||'',status:'Не сконтактовано',date:td()});
  ['an','aph','aad','awe','arat','apid'].forEach(id=>document.getElementById(id).value='');
  render();
}
function copyMd(){
  const h='| Назва | Місто | Адреса | Телефон | Сайт | Рейтинг | Статус |\n|---|---|---|---|---|---|---|';
  const r=data.map(r=>`| ${r.name} | ${r.city} | ${r.addr} | ${r.phone} | ${r.site||'—'} | ★ ${r.rating} | ${r.status} |`).join('\n');
  navigator.clipboard.writeText(h+'\n'+r).then(()=>{const b=document.querySelector('.cb');b.textContent='Скопійовано!';setTimeout(()=>b.textContent='Копіювати MD',1800);});
}
render();
</script>
