<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vermarkter — Seite nicht gefunden</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1768018062">
    <script>
        (function () {
            var path = window.location.pathname;

            // Exception: admin/CRM files (vrm_*) and root-level .html files
            // must NOT be lang-redirected — they are direct assets, not lang pages
            if (/^\/vrm_/i.test(path) || /^\/[^\/]+\.html$/i.test(path)) {
                return;
            }

            var LANGS = ['de', 'en', 'pl', 'ru', 'tr', 'ua'];
            var detectedLang = 'de';
            for (var i = 0; i < LANGS.length; i++) {
                if (path === '/' + LANGS[i] + '/' ||
                    path === '/' + LANGS[i] ||
                    path.indexOf('/' + LANGS[i] + '/') === 0) {
                    detectedLang = LANGS[i];
                    break;
                }
            }

            window.location.replace('/' + detectedLang + '/');
        })();
    </script>
</head>
<body>
    <p>Seite nicht gefunden. Weiterleitung...</p>
    <p><a href="/de/">Zurück zur Startseite</a></p>
</body>
</html>
