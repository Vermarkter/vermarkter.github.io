<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vermarkter — Seite nicht gefunden</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1768018062">
    <script>
        (function () {
            var LANGS = ['de', 'en', 'pl', 'ru', 'tr', 'ua'];
            var path  = window.location.pathname;          // e.g. "/de/de/unknown"

            // Find the FIRST lang segment in the path
            var detectedLang = 'de';
            for (var i = 0; i < LANGS.length; i++) {
                // Match /lang/ or /lang at end-of-string
                if (path === '/' + LANGS[i] + '/' ||
                    path === '/' + LANGS[i] ||
                    path.indexOf('/' + LANGS[i] + '/') === 0) {
                    detectedLang = LANGS[i];
                    break;
                }
            }

            // Always redirect to absolute /<lang>/ — never relative
            window.location.replace('/' + detectedLang + '/');
        })();
    </script>
</head>
<body>
    <p>Seite nicht gefunden. Weiterleitung...</p>
    <p><a href="/de/">Zurück zur Startseite</a></p>
</body>
</html>
